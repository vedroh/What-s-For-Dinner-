{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h3 class="mb-0">👤 Profile</h3>
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="bg-light rounded-circle d-inline-flex p-4 mb-3">
                        <i class="fas fa-user fa-5x text-primary"></i>
                    </div>
                    <h4>{{ session['user_name'] }}</h4>
                    <p class="text-muted">@{{ session['username'] }}</p>
                </div>
                
                <div class="alert alert-info">
                    <h5>Statistics</h5>
                    <p class="mb-0">Reviews written: 0</p>
                    <p class="mb-0">Favorite recipes: 0</p>
                    <p class="mb-0">Saved recipes: 0</p>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="{{ url_for('index' )}}" class="btn btn-outline-primary">🏠 Go to main page</a>
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">🚪 Log out</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
